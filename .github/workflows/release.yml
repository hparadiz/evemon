name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to upload assets to the GitHub Release

jobs:
  build-deb-debian12:
    name: Build .deb (Debian 12)
    runs-on: ubuntu-latest
    outputs:
      deb_path: ${{ steps.find.outputs.deb_path }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build -t evemon-builder-debian12 -f packaging/debian12/Dockerfile .

      - name: Build .deb package
        run: |
          mkdir -p dist/debian12
          docker run --rm \
            -e VERSION=${{ steps.ver.outputs.version }} \
            -v "${{ github.workspace }}:/src:ro" \
            -v "${{ github.workspace }}/dist/debian12:/out" \
            evemon-builder-debian12

      - name: Find .deb artifact
        id: find
        run: |
          path=$(ls dist/debian12/*.deb | head -1)
          echo "deb_path=$path" >> "$GITHUB_OUTPUT"

      - name: Upload .deb to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find.outputs.deb_path }}

  build-rpm-fedora42:
    name: Build .rpm (Fedora 42)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build -t evemon-builder-fedora42 -f packaging/fedora42/Dockerfile .

      - name: Build .rpm package
        run: |
          mkdir -p dist/fedora42
          docker run --rm \
            -e VERSION=${{ steps.ver.outputs.version }} \
            -e RELEASE=1 \
            -v "${{ github.workspace }}:/src:ro" \
            -v "${{ github.workspace }}/dist/fedora42:/out" \
            evemon-builder-fedora42

      - name: Find .rpm artifact
        id: find
        run: |
          path=$(ls dist/fedora42/*.rpm | head -1)
          echo "rpm_path=$path" >> "$GITHUB_OUTPUT"

      - name: Upload .rpm to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find.outputs.rpm_path }}
